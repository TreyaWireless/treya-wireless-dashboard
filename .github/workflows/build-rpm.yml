name: Build & Release Treya Wireless RPMs

on:
  push:
    branches:
      - main
    paths:
      - 'ui/**'
      - 'omada_monitor.py'
      - '.github/workflows/**'

jobs:
  build-rpm:
    name: Build RPM Packages
    runs-on: ubuntu-latest
    container:
      image: almalinux:9

    steps:
      # ── Step 1: Source Code checkout ──────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Step 2: Build tools install ───────────────────
      - name: Install RPM build dependencies
        run: |
          dnf install -y rpm-build rpmdevtools rsync wget tar gzip \
                         make gcc gcc-c++ autoconf automake libtool \
                         mysql-devel openssl-devel libcurl-devel \
                         net-snmp-devel libxml2-devel libevent-devel \
                         pcre2-devel python3-pip
          rpmdev-setuptree

      # ── Step 3: Version number auto-increment ─────────
      - name: Set version number
        id: version
        run: |
          MAJOR=7
          MINOR=0
          PATCH=${{ github.run_number }}
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG=Treya_Wireless-v${VERSION}_RPMs" >> $GITHUB_ENV
          echo "Building version: ${VERSION}"

      # ── Step 4: Source tarball बनवा ────────────────────
      - name: Prepare source tarball
        run: |
          mkdir -p /tmp/treya-build
          cp -r . /tmp/treya-build/treya-wireless-${{ env.VERSION }}
          cd /tmp/treya-build
          tar -czf ~/rpmbuild/SOURCES/treya-wireless-${{ env.VERSION }}.tar.gz \
              treya-wireless-${{ env.VERSION }}/
          echo "Source tarball created."

      # ── Step 5: SPEC file आणि Build files download ────
      - name: Download SPEC and build files
        run: |
          wget -q "https://raw.githubusercontent.com/TreyaWireless/treya-wireless-rpms/main/SPECS/treya-wireless.spec" \
               -O ~/rpmbuild/SPECS/treya-wireless.spec || echo "SPEC not found in repo"

      # ── Step 6: RPM Build ──────────────────────────────
      - name: Build RPM packages
        run: |
          sed -i "s/Version:.*/Version:\t${{ env.VERSION }}/g" ~/rpmbuild/SPECS/treya-wireless.spec
          sed -i "s/--enable-dependency-tracking/--disable-dependency-tracking/g" ~/rpmbuild/SPECS/treya-wireless.spec

          rpmbuild -ba \
            --define 'build_server 0' \
            --define 'build_agent 0' \
            --define 'build_agent2 0' \
            --define 'build_proxy 0' \
            --define 'build_java 0' \
            --define 'build_web_service 0' \
            ~/rpmbuild/SPECS/treya-wireless.spec

          echo "Built RPMs:"
          ls -la ~/rpmbuild/RPMS/noarch/

      # ── Step 7: GitHub Release तयार करा ───────────────
      - name: Create GitHub Release with RPMs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Treya Wireless v${{ env.VERSION }} Release"
          body: |
            ## Treya Wireless v${{ env.VERSION }}

            Auto-built from commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Build number: #${{ github.run_number }}

            ### EC2 वर Install करण्यासाठी:
            ```bash
            curl -fsSL https://github.com/TreyaWireless/treya-wireless-rpms/releases/download/${{ env.TAG }}/treya_install.sh | sudo bash
            ```

            ### Already Installed असेल तर Update करा:
            ```bash
            sudo dnf reinstall -y https://github.com/TreyaWireless/treya-wireless-rpms/releases/download/${{ env.TAG }}/treya-wireless-web-${{ env.VERSION }}-release1.el9.noarch.rpm
            sudo systemctl restart treya-wireless-server
            ```
          files: |
            ~/rpmbuild/RPMS/noarch/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 8: EC2 Auto Update via SSH ───────────────
      - name: Auto Update EC2 Server
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Treya Wireless Auto Update ==="
            NEW_URL="https://github.com/TreyaWireless/treya-wireless-rpms/releases/download/${{ env.TAG }}/treya-wireless-web-${{ env.VERSION }}-release1.el9.noarch.rpm"
            dnf reinstall -y "$NEW_URL" || dnf install -y "$NEW_URL"
            systemctl restart treya-wireless-server
            echo "=== Update Done! Version: ${{ env.VERSION }} ==="
