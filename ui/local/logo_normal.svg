  <text x="36" y="14" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="11" fill="#0f172a" letter-spacing="0.5">TREYA WIRELESS</text>
  <text x="36" y="24" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="600" font-size="7.5" fill="#e11d48" letter-spacing="0.2">The Smarter Wireless</text>
</svg>
