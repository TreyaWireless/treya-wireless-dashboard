<svg xmlns="http://www.w3.org/2000/svg" width="160" height="30" viewBox="0 0 160 30">
  <defs>
    <clipPath id="clip-normal">
      <rect x="0" y="0" width="30" height="30" />
    </clipPath>
  </defs>
  <!-- Render logo mark square from image -->
  <image href="data:image/webp;base64," x="0" y="0" width="93.75" height="30" clip-path="url(#clip-normal)" />
